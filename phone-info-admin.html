/* ─── BREVO SMS ─── */
const sendSMS = async (telephone, message) => {
  const tel = telephone.replace(/\s/g,'').replace(/^0/,'+33');
  try {
    const res = await fetch('https://api.brevo.com/v3/transactionalSMS/sms', {
      method:'POST',
      headers:{'api-key':BREVO_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({
        sender: BREVO_SENDER,
        recipient: tel,
        content: message,
        type: 'transactional'
      })
    });
    const data = await res.json();
    if(res.ok){ console.log('SMS envoyé:', data); return true; }
    else{ console.error('Brevo error:', data); return false; }
  } catch(e){
    console.error('SMS error:', e);
    return false;
  }
};

/* ─── MODAL AJOUT RÉPARATION ─── */
function ModalAjout({onClose,onAdd,onNotif}){
  const [form,setForm]=useState({client:'',telephone:'',email:'',appareil:'',marque:'Apple',panne:'',prix:'',statut:'recu'});
  const [loading,setLoading]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const ajouter=async()=>{
    if(!form.client||!form.appareil){onNotif('Remplissez nom et appareil');return;}
    setLoading(true);
    const ref=mkRef('PIS');
    const tel=(form.telephone||'').replace(/\s/g,'');
    const {data,error}=await sb.from('reparations').insert({
      reference:ref,
      nom_client:form.client,
      tel_client:tel,
      appareil:form.appareil,
      marque:form.marque||'',
      panne:form.panne||'',
      prix:form.prix||'',
      statut:form.statut||'recu',
      progression:STATUTS[form.statut]?.pct||10,
      notifie:false
    }).select().single();
    if(error){
      onNotif('Erreur: '+error.message);
      setLoading(false);
      return;
    }
    const rep={...data,clients:{nom:form.client,telephone:form.telephone}};
    onAdd(rep);
    if(tel) sendSMS(tel,'Bonjour '+form.client.split(' ')[0]+' ! Recu votre '+form.appareil+'. Ref: '+ref+' - Phone Info Service');
    onNotif('Reparation ajoutee #'+ref);
    setLoading(false);
    onClose();
  };

  return h(Sheet,{onClose},
    h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:16}},
      h('div',{style:{fontWeight:800,fontSize:16,color:V.text}},'➕ Nouvelle réparation'),
      h('button',{onClick:onClose,style:{background:V.card,border:`1px solid ${V.border}`,borderRadius:8,width:30,height:30,cursor:'pointer',color:V.muted,fontSize:16}},'×')

      h('div',{key:k},h('label',{style:lblStyle},l),h('input',{style:inpStyle,placeholder:p,value:form[k],onChange:e=>set(k,e.target.value)}))
    ),
    h('label',{style:lblStyle},'Marque'),
    h('select',{style:inpStyle,value:form.marque,onChange:e=>set('marque',e.target.value)},MARQUES.map(m=>h('option',{key:m,value:m},m))),
    h('label',{style:lblStyle},'Prix estimé'),
    h('input',{style:inpStyle,placeholder:'89€',value:form.prix,onChange:e=>set('prix',e.target.value)}),
    h('label',{style:lblStyle},'Statut initial'),
    h('select',{style:{...inpStyle,marginBottom:14},value:form.statut,onChange:e=>set('statut',e.target.value)},
      Object.entries(STATUTS).map(([k,v])=>h('option',{key:k,value:k},`${v.icon} ${v.label}`))
    ),
    h('div',{style:{background:V.greenBg,border:`1px solid ${V.greenBr}`,borderRadius:10,padding:'10px 14px',fontSize:12,color:V.green,marginBottom:16}},'📱 Un SMS de confirmation sera ouvert si un numéro est renseigné.'),
    h('div',{style:{display:'flex',gap:10}},

function TarifsTab({onNotif}){
  const [allTarifs,setAllTarifs]=useState([]);
  const [marque,setMarque]=useState('Apple');
  const [search,setSearch]=useState('');
  const [editing,setEditing]=useState(null);
  const [showAjout,setShowAjout]=useState(false);
  const [newT,setNewT]=useState({marque:'Apple',nom:'',prix:'',duree:'1h'});

  useEffect(()=>{
    db.getTarifs().then(d=>{if(d)setAllTarifs(d);});
  },[]);

  const marques=[...new Set(allTarifs.map(t=>t.marque))];
  const items=allTarifs.filter(t=>t.marque===marque&&t.nom.toLowerCase().includes(search.toLowerCase()));

  const toggleActif=async(t)=>{
    await db.updateTarif(t.id,{actif:!t.actif});
    setAllTarifs(p=>p.map(x=>x.id===t.id?{...x,actif:!x.actif}:x));
  };
  const supprimer=async(t)=>{
    await db.deleteTarif(t.id);
    setAllTarifs(p=>p.filter(x=>x.id!==t.id));
    setEditing(null);onNotif('🗑 Supprimé');
  };
  const sauvegarder=async(t)=>{
    await db.updateTarif(t.id,{nom:t.nom,prix:t.prix,duree:t.duree});
    setAllTarifs(p=>p.map(x=>x.id===t.id?t:x));
    setEditing(null);onNotif('✓ Tarif mis à jour !');
  };
  const ajouter=async()=>{
    if(!newT.nom||!newT.prix)return;
    const saved=await db.addTarif({...newT,actif:true,ordre:items.length+1});
    if(saved&&saved[0])setAllTarifs(p=>[...p,saved[0]]);
    setNewT({marque:'Apple',nom:'',prix:'',duree:'1h'});
    setShowAjout(false);onNotif('✓ Tarif ajouté !');
  };

  const Form=({title,data,setData,onConfirm,onClose,showDel})=>
    h(Sheet,{onClose},
      h('div',{style:{fontWeight:800,fontSize:16,color:V.text,marginBottom:16}},title),
      title.includes('Nouveau')&&h('div',null,
        h('label',{style:lblStyle},'Marque'),
        h('select',{style:inpStyle,value:data.marque,onChange:e=>setData(n=>({...n,marque:e.target.value}))},MARQUES.map(m=>h('option',{key:m,value:m},m)))
      ),
      h('label',{style:lblStyle},'Nom de la prestation'),
      h('input',{style:inpStyle,value:data.nom,onChange:e=>setData(n=>({...n,nom:e.target.value}))}),
      h('label',{style:lblStyle},'Prix'),
      h('input',{style:inpStyle,placeholder:'89€',value:data.prix,onChange:e=>setData(n=>({...n,prix:e.target.value}))}),
      h('label',{style:lblStyle},'Durée'),
      h('select',{style:{...inpStyle,marginBottom:20},value:data.duree,onChange:e=>setData(n=>({...n,duree:e.target.value}))},
        ['30min','45min','1h','1h30','2h','2h30','3h'].map(d=>h('option',{key:d,value:d},d))
      ),
      h('div',{style:{display:'flex',gap:10}},
        showDel&&h('button',{onClick:()=>supprimer(data),style:btnBase(V.redBg,V.red,`1px solid ${V.redBr}`)},'🗑'),
        h('button',{onClick:onClose,style:btnBase(V.card,V.muted,`1px solid ${V.border}`)},'Annuler'),
        h('button',{onClick:onConfirm,style:{...btnBase(`linear-gradient(135deg,${V.accent},${V.pink})`,'#fff'),flex:2,opacity:data.nom&&data.prix?1:.45}},'✓ Sauvegarder')
      )
    );

  return h('div',{style:{padding:'16px 16px 100px'}},
    showAjout&&h(Form,{title:'➕ Nouveau tarif',data:newT,setData:setNewT,onConfirm:ajouter,onClose:()=>setShowAjout(false),showDel:false}),
    editing&&h(Form,{title:'✏️ Modifier',data:editing,setData:setEditing,onConfirm:()=>sauvegarder(editing),onClose:()=>setEditing(null),showDel:true}),

    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}},
      h('div',null,h('div',{style:{fontSize:22,fontWeight:800,color:V.text}},'Tarifs'),h('div',{style:{fontSize:12,color:V.muted}},'Grille des prestations')),
      h('button',{onClick:()=>setShowAjout(true),style:{background:`linear-gradient(135deg,${V.accent},${V.pink})`,border:'none',borderRadius:12,padding:'10px 16px',color:'#fff',fontWeight:700,fontSize:12,cursor:'pointer',boxShadow:glow(V.accent)}},'➕ Ajouter')
    ),

    h('input',{style:{...inpStyle,margin:'14px 0 12px'},placeholder:'🔍 Rechercher...',value:search,onChange:e=>setSearch(e.target.value)}),

    h('div',{style:{display:'flex',gap:6,overflowX:'auto',marginBottom:16,paddingBottom:4}},
      marques.map(m=>h('div',{key:m,onClick:()=>setMarque(m),style:{flexShrink:0,padding:'7px 14px',borderRadius:20,fontSize:12,fontWeight:700,cursor:'pointer',
        background:marque===m?V.accent:V.card,color:marque===m?'#fff':V.muted,border:`1px solid ${marque===m?V.accent:V.border}`}},`${m} (${(tarifs[m]||[]).length})`))
    ),

    items.map(t=>h('div',{key:t.id,style:{background:V.card,border:`1px solid ${t.actif?V.border:V.redBr}`,borderRadius:14,padding:'12px 14px',marginBottom:8,display:'flex',alignItems:'center',gap:10,opacity:t.actif?1:.5}},
      h('div',{style:{flex:1}},
        h('div',{style:{fontSize:13,fontWeight:700,color:V.text}},t.nom),
        h('div',{style:{fontSize:11,color:V.muted,marginTop:2}},`⏱ ${t.duree}${!t.actif?' · Masqué':''}`)
      ),
      h('div',{style:{fontSize:15,fontWeight:800,color:V.accent,marginRight:4}},t.prix),
      h('button',{onClick:()=>toggleActif(t),style:{background:t.actif?V.greenBg:V.redBg,border:`1px solid ${t.actif?V.greenBr:V.redBr}`,borderRadius:8,padding:'6px 10px',cursor:'pointer',fontSize:12,fontWeight:700,color:t.actif?V.green:V.red}},t.actif?'✓':'✗'),
      h('button',{onClick:()=>setEditing({...t}),style:{background:V.accentBg,border:`1px solid ${V.accentBr}`,borderRadius:8,padding:'6px 10px',cursor:'pointer',fontSize:12,color:V.accent}},'✏️')
    )),
    items.length===0&&h('div',{style:{textAlign:'center',color:V.muted,marginTop:60,fontSize:13}},'Aucun tarif')
  );
}

/* ─── APP ─── */
const TABS=[{id:'repairs',icon:'🔧',label:'Réparations'},{id:'devis',icon:'📋',label:'Devis'},{id:'rdv',icon:'📅',label:'RDV'},{id:'tarifs',icon:'💰',label:'Tarifs'}];

function App(){
  const [tab,setTab]=useState('repairs');
  const [toast,setToast]=useState(null);
  const notif=msg=>setToast(msg);

  return h(React.Fragment,null,
    toast&&h(Toast,{msg:toast,onClose:()=>setToast(null)}),
    h('div',{style:{background:V.bg,minHeight:'100vh',color:V.text,maxWidth:430,margin:'0 auto',position:'relative'}},

      /* header */
      h('div',{style:{background:`linear-gradient(135deg,${V.surface},${V.card})`,padding:'14px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:100,borderBottom:`1px solid ${V.border}`}},
        h('div',{style:{display:'flex',alignItems:'center',gap:12}},
          h('div',{style:{width:42,height:42,background:`linear-gradient(135deg,${V.accent},${V.pink})`,borderRadius:13,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,boxShadow:glow(V.accent)}},'📱'),
          h('div',null,
            h('div',{style:{fontSize:17,fontWeight:800,color:V.text}},'Phone Info Service'),
            h('div',{style:{fontSize:10,color:V.muted,fontWeight:700,textTransform:'uppercase',letterSpacing:1}},'Administration')
          )
        ),
        h('div',{style:{display:'flex',alignItems:'center',gap:6,background:V.greenBg,border:`1px solid ${V.greenBr}`,borderRadius:20,padding:'6px 12px'}},
          h('span',{style:{width:7,height:7,borderRadius:'50%',background:V.green,display:'inline-block',animation:'pulse 2s infinite'}}),
          h('span',{style:{fontSize:11,fontWeight:700,color:V.green}},'En ligne')
        )
      ),

      /* tabs content */
      tab==='repairs'&&h(RepairsTab,{onNotif:notif}),
      tab==='devis'&&h(DevisTab,{onNotif:notif}),
      tab==='rdv'&&h(RdvTab,{onNotif:notif}),
      tab==='tarifs'&&h(TarifsTab,{onNotif:notif}),

      /* bottom nav */
      h('div',{style:{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:430,background:V.surface,borderTop:`1px solid ${V.border}`,display:'flex',zIndex:100}},
        TABS.map(t=>h('div',{key:t.id,onClick:()=>setTab(t.id),style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',padding:'10px 4px',gap:3,cursor:'pointer',
          color:tab===t.id?V.accent:V.muted,fontSize:9,fontWeight:tab===t.id?700:500,textTransform:'uppercase',letterSpacing:.5,position:'relative'}},
          h('div',{style:{position:'absolute',top:0,left:'20%',right:'20%',height:2,background:tab===t.id?V.accent:'transparent',borderRadius:'0 0 4px 4px',boxShadow:tab===t.id?glow(V.accent):'none'}}),
          h('span',{style:{fontSize:20}},t.icon),
          t.label
        ))
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
